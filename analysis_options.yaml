include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_unused_constructor_parameters
    - directives_ordering
    - prefer_final_locals
    - unawaited_futures
